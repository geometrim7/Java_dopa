<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <title>Zadanie 55 - Zamojski</title>
</head>
<body>
    <script>
        let a_zam = parseInt(prompt("Podaj wymiar a (wysokość):", "5"));
        let b_zam = parseInt(prompt("Podaj wymiar b (szerokość):", "23"));

        for (let i = 0; i < b_zam; i++) {
            document.write("*");
        }
        document.write("<br>");

        for (let i = 1; i <= (a_zam - 2); i++) {
            let wiersz_zam = "*";
            for (let j = 1; j <= (b_zam - 2); j++) {
                wiersz_zam = wiersz_zam + "&nbsp;&nbsp;";
            }
            wiersz_zam = wiersz_zam + "*";
            document.write(wiersz_zam + "<br>");
        }

        for (let i = 0; i < b_zam; i++) {
            document.write("*");
        }
        document.write("<br>");
    </script>
</body>
</html>
