<!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="UTF-8">
<title>Przykład użycia pętli</title>
</head>
<body>

<script>
for (var i = 1; i <= 10; i++)
{
    for (var k = 1; k <= i; k++)
    {
        document.write("&nbsp;");
    }

    document.write(i + "<br>");
}
</script>

</body>
