<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <title>Zadanie 56 - Zamojski</title>
</head>
<body>
    <script>
        let imie_zam = prompt("Podaj imię:", "Michał");
        let nazwisko_zam = prompt("Podaj nazwisko:", "Zamojski");

        let a_zam = (nazwisko_zam.length % 4) + 5; 
        let b_zam = (imie_zam.length % 6) + 20; 

        document.write("Obliczone wymiary: a = " + a_zam + ", b = " + b_zam + "<br><br>");

        for (let i = 0; i < b_zam; i++) {
            document.write("*");
        }
        document.write("<br>");

        for (let i = 0; i < a_zam - 2; i++) {
            document.write("*");
            for (let j = 0; j < b_zam - 2; j++) {
                document.write("&nbsp;&nbsp;");
            }
            document.write("*<br>");
        }

        for (let i = 0; i < b_zam; i++) {
            document.write("*");
        }
        document.write("<br>");
    </script>
</body>
