<!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="UTF-8">
<title>Zadanie 51</title>
</head>
<body>

<script>
let n_zam = parseInt(prompt("Podaj liczbę n:"));

let silnia_zam = 1;

for(let i_zam = 1; i_zam <= n_zam; i_zam++)
{
    silnia_zam = silnia_zam * i_zam;
}

document.write(n_zam + "! = " + silnia_zam);
</script>
