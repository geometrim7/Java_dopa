<!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="UTF-8">
<title>Zadanie 47 - Michał Zamojski</title>
</head>
<body>

<script>
let liczba = parseInt(prompt("Podaj liczbę:"));

let ile_razy = (liczba % 4) + 10;
let wielkosc = (liczba % 4) + 40;

document.write("Ilość wyświetleń = " + ile_razy + "<br>");
document.write("Wielkość liter = " + wielkosc + "px<br><br>");

for(let i = 1; i <= ile_razy; i++)
{
    if(liczba % 2 == 0)
    {
        document.write("<span style='font-size:" + wielkosc + "px'>Zamojski</span><br>");
    }
    else
    {
        document.write("<span style='font-size:" + wielkosc + "px'>Michał</span><br>");
    }
}
</script>

</body>
</html>
