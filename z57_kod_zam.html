<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <title>Zadanie 57 - Zamojski</title>
</head>
<body>
    <script>
        let l1_t_zam = parseInt(prompt("Podaj pierwszą liczbę z przedziału <20, 60>:", "25"));
        while(l1_t_zam < 20 || l1_t_zam > 60) {
            alert("Liczba nie należy do przedziału <20,60>");
            l1_t_zam = parseInt(prompt("Podaj pierwszą liczbę ponownie:", "25"));
        }

        let l2_t_zam = parseInt(prompt("Podaj drugą liczbę z przedziału <20, 60>:", "55"));
        while(l2_t_zam < 20 || l2_t_zam > 60) {
            alert("Liczba nie należy do przedziału <20,60>");
            l2_t_zam = parseInt(prompt("Podaj drugą liczbę ponownie:", "55"));
        }

        let pocz_zam = "zam"; 
        let tekst_zam = prompt("Wpisz dowolny tekst do wyświetlenia:", "Michał");

        if (l1_t_zam < l2_t_zam) {
            for (let i = l1_t_zam; i <= l2_t_zam; i += 5) {
                if (i > 100) break;
                document.write("<p style=\"font-size:" + i + "px; color: black;\">" + i + "<br>" + tekst_zam + "<br></p>");
            }
        } else if (l1_t_zam > l2_t_zam) {
            for (let i = l1_t_zam; i >= l2_t_zam; i -= 5) {
                if (i < 0) break;
                document.write("<p style=\"font-size:" + i + "px; color: black;\">" + i + "<br>" + tekst_zam + "<br></p>");
            }
        } else {
            document.write("<p style=\"font-size:" + l1_t_zam + "px; color: black;\">" + l1_t_zam + "<br>" + tekst_zam + "<br></p>");
        }
    </script>
